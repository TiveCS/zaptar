name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build and publish
        run: pnpm build:win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  release-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build and publish
        run: pnpm build:mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Set to sign with Apple certificate — leave unset for unsigned build
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

  release-linux:
    # Pinned to 22.04 because ubuntu-24.04 dropped libfuse2 (required by
    # AppImage runtime) and updated dpkg in ways that broke fpm's deb output.
    # Bumping to 24.04 is fine once electron-builder ships an AppImage runtime
    # that doesn't need libfuse2.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build deps
        # libfuse2  → AppImage runtime
        # fakeroot, dpkg → deb packaging via fpm
        # rpm        → optional, useful if rpm target added later
        run: sudo apt-get update && sudo apt-get install -y libfuse2 fakeroot dpkg

      - name: Install dependencies
        run: pnpm install

      - name: Build and publish (AppImage + deb)
        # snap requires snapcraft+LXD — build locally with `pnpm build:linux`
        run: pnpm build && electron-builder --linux AppImage deb --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
