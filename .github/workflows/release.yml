name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build and publish
        run: pnpm build:win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  release-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build and publish
        run: pnpm build:mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Set to sign with Apple certificate — leave unset for unsigned build
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build and publish (AppImage + deb)
        # snap requires snapcraft+LXD — build locally with `pnpm build:linux`
        run: pnpm build && electron-builder --linux AppImage deb --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
